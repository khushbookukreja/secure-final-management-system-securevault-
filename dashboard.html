{% extends 'base.html' %}

{% block content %}
<div class="glass-card">
    <h2 class="mb-4">Welcome, {{ user }} 👋</h2>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card">
                <h4><i class="fa fa-upload"></i> Upload File</h4>

                <form method="POST" action="/upload" enctype="multipart/form-data" class="mt-3">
                    <input type="file" name="file" class="form-control mb-3" required>
                    <button class="btn btn-primary w-100">Upload Securely</button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="glass-card">
                <h4><i class="fa fa-bolt"></i> Quick Actions</h4>

                <div class="d-grid gap-3 mt-3">
                    <a href="/files" class="btn btn-success">
                        <i class="fa fa-folder"></i> View Files
                    </a>

                    <a href="/admin" class="btn btn-warning">
                        <i class="fa fa-user-shield"></i> Admin Panel
                    </a>

                    <a href="/logout" class="btn btn-danger">
                        <i class="fa fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
